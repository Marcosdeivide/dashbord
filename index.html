<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>dashboard</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!--container e siderbar-->
    <div class="container">
      <nav class="nav-items">
        <a href="">home</a>
        <a href="">producao</a>
        <a href="">insumos</a>
      </nav>
      <!--are dos graficicos-->
      <div class="area-direita">
        <header class="graficos-text">
          <h1>graficos</h1>
          <input type="text" placeholder="pesquise aqui.." />
        </header>
        <main class="graficos">
          <div class="area-card">
            <div class="card">
              <div class="card-finalizado">
                <h3>finalizados</h3>
                <span class="text-size">1200 un</span>
                <p><span class="destaque">+5% </span>hoje</p>
              </div>
            </div>
            <!--cards-->
            <div class="card">
              <div class="card-andamento">
                <h3>andamento</h3>
                <span class="text-size">800 un</span>
                <p><span class="destaque">+5% </span>hoje</p>
              </div>
            </div>
            <!--s-->
            <div class="card">
              <div class="card-nao-concluido">
                <h3>nao concluido</h3>
                <span class="text-size">100 un</span>
                <p><span class="destaque">+5% </span>hoje</p>
              </div>
            </div>
            <!--s-->
          </div>
        </main>
      </div>
    </div>
  </body>
</html>
